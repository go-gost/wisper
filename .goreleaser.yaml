# GoReleaser configuration for Wisper
# https://goreleaser.com

version: 2

# ---- Web UI must exist before go build (embedded via //go:embed) ----
before:
  hooks:
    - npm ci --prefix web-src
    - npm run build --prefix web-src

# ---- Cross-compile Go binaries ----
builds:
  - id: wisper
    binary: wisper
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/go-gost/wisper/version.Version={{ .Version }}

# ---- Archives (.tar.gz / .zip) ----
archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

# ---- Checksum ----
checksum:
  name_template: checksums.txt

# ---- Changelog ----
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - Merge pull request
      - Merge branch

# GitHub Release is created by the create-release job in
# .github/workflows/release.yml and populated by goreleaser + desktop jobs
# via softprops/action-gh-release. The release section is intentionally absent.
