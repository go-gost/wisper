name: Release

on:
  push:
    tags: ["v*"]

jobs:
  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - run: golangci-lint run --timeout=5m

  test:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - run: go test ./... -v -race -count=1

  create-release:
    name: Create Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          DELIM="EOF_${RANDOM}_$(date +%s)"
          echo "changelog<<${DELIM}" >> $GITHUB_OUTPUT
          git log --pretty='format:- %s (%h)' $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser:
    name: Build & Release (Go)
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-src/package-lock.json

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-linux:
    name: Desktop (Linux)
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-src/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build web UI
        run: cd web-src && npm ci && npx vite build

      - name: Inject version (tag → bare semver)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Build Go sidecar
        run: make sidecar VERSION=${{ env.VERSION }}

      - name: Build Linux installers
        run: npx --yes @tauri-apps/cli@latest build --bundles deb,appimage
        working-directory: src-tauri

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-windows:
    name: Desktop (Windows)
    needs: [create-release]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-src/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build web UI
        run: cd web-src && npm ci && npx vite build

      - name: Build Go sidecar (Windows)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p src-tauri/binaries
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags "-s -w -X github.com/go-gost/wisper/version.Version=${VERSION}" \
            -o src-tauri/binaries/wisper-api-x86_64-pc-windows-msvc.exe .

      - name: Build Windows installer
        run: npx --yes @tauri-apps/cli@latest build --bundles nsis
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Android (APK)
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-src/package-lock.json

      - name: Build web UI
        run: cd web-src && npm ci && npx vite build

      - name: Download Go modules
        run: go mod download

      - name: Build Android Docker image
        run: DOCKER_BUILDKIT=1 docker build -t wisper-android -f android/Dockerfile.android android/

      - name: Build APK (cross-compile + Gradle)
        env:
          TAG: ${{ github.ref_name }}
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          VERSION="${TAG#v}"
          echo "Building Wisper APK version=${VERSION} (tag=${TAG})"
          # Derive Android versionCode from semver (major*10000 + minor*100 + patch),
          # dropping any prerelease suffix first. Computed HERE, outside the
          # sh -c script below, so the single-quoted sed/awk programs are safe
          # (single quotes must not appear inside the sh -c '...' blob).
          VCODE=$(echo "${VERSION}" | sed 's/-.*//' | awk -F. '{print $1*10000+$2*100+$3}')
          echo "Computed versionCode=${VCODE}"

          docker run --rm \
            -e "WISPER_VERSION=${VERSION}" \
            -e "VCODE=${VCODE}" \
            -e "ANDROID_KEYSTORE" \
            -e "ANDROID_KEYSTORE_PASSWORD" \
            -v "$PWD:/wisper" \
            -v "$(go env GOMODCACHE):/root/go/pkg/mod" \
            -v "$(go env GOCACHE):/root/.cache/go-build" \
            -w /wisper \
            wisper-android sh -c '
              set -e
              NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

              echo "--- Materializing release keystore from GitHub Secret ---"
              if [ -z "$ANDROID_KEYSTORE" ]; then
                echo "ERROR: ANDROID_KEYSTORE secret is not set."
                echo "Set it to the base64 of android/release.keystore before tagging a release."
                exit 1
              fi
              echo "$ANDROID_KEYSTORE" | base64 -d > /wisper/android/release.keystore
              # keystore.properties: one property per line, written with echo.
              # This block runs inside sh -c, so do not use single-quoted
              # literals or backslash-n escapes here; the outer shell would
              # strip them. echo supplies the line breaks.
              {
                echo "storeFile=release.keystore"
                echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
                echo "keyAlias=wisper"
                echo "keyPassword=$ANDROID_KEYSTORE_PASSWORD"
              } > /wisper/android/keystore.properties

              echo "--- Injecting version ${WISPER_VERSION} (versionCode=${VCODE}) ---"
              sed -i "s/versionCode = [0-9][0-9]*/versionCode = ${VCODE}/" /wisper/android/app/build.gradle.kts
              sed -i "s/versionName = \"[^\"]*\"/versionName = \"${WISPER_VERSION}\"/" /wisper/android/app/build.gradle.kts

              echo "--- Copying JNI bridge ---"
              cp /wisper/android/lib_jni.c /wisper/

              echo "--- Cross-compiling libwisper.so (arm64-v8a) ---"
              export CC="$NDK_BIN/aarch64-linux-android24-clang"
              export CXX="$NDK_BIN/aarch64-linux-android24-clang++"
              export CGO_ENABLED=1 GOOS=android GOARCH=arm64
              cd /wisper
              go build -buildmode=c-shared -buildvcs=false \
                -ldflags="-s -w -X github.com/go-gost/wisper/version.Version=${WISPER_VERSION}" \
                -o android/app/src/main/jniLibs/arm64-v8a/libwisper.so .

              echo "--- Cross-compiling libwisper.so (x86_64) ---"
              export CC="$NDK_BIN/x86_64-linux-android24-clang"
              export CXX="$NDK_BIN/x86_64-linux-android24-clang++"
              export GOARCH=amd64
              go build -buildmode=c-shared -buildvcs=false \
                -ldflags="-s -w -X github.com/go-gost/wisper/version.Version=${WISPER_VERSION}" \
                -o android/app/src/main/jniLibs/x86_64/libwisper.so .

              rm -f /wisper/lib_jni.c

              echo "--- Building release APK ---"
              cd /wisper/android
              gradle assembleRelease --no-daemon

              echo "--- APK info ---"
              APK="app/build/outputs/apk/release/app-release.apk"
              if [ -f "$APK" ]; then
                ls -lh "$APK"
                cp "$APK" "/wisper/Wisper_${WISPER_VERSION}_android.apk"
                echo "Copied to Wisper_${WISPER_VERSION}_android.apk"
              else
                echo "ERROR: APK not found at $APK"
                exit 1
              fi
            '

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Wisper_*_android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
