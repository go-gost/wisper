# AVD configuration for test_avd (API 34, x86_64, Google APIs)
# Applied over the manually-created AVD config.

# ── System image ────────────────────────────────────────────────────
abi.type=x86_64
hw.cpu.arch=x86_64
hw.cpu.ncore=4
hw.ramSize=2048
vm.heapSize=256
image.sysdir.1=system-images/android-34/google_apis/x86_64/

# ── Display ─────────────────────────────────────────────────────────
hw.lcd.density=420
hw.lcd.height=2400
hw.lcd.width=1080
hw.initialOrientation=portrait

# ── GPU ─────────────────────────────────────────────────────────────
hw.gpu.enabled=yes
hw.gpu.mode=host

# ── Sensors / I/O ───────────────────────────────────────────────────
hw.keyboard=yes
hw.mainKeys=no
hw.dPad=no
hw.trackBall=no
hw.accelerometer=yes
hw.sensors.proximity=yes
hw.sensors.orientation=yes
hw.gps=yes
hw.audioInput=yes
hw.audioOutput=yes
hw.battery=yes

# ── Connectivity ────────────────────────────────────────────────────
hw.wifi=yes
hw.gsmModem=yes
hw.bluetooth=yes

# ── Storage ─────────────────────────────────────────────────────────
hw.sdCard=yes
disk.dataPartition.size=4096M

# ── Tag ─────────────────────────────────────────────────────────────
tag.id=google_apis
tag.display=Google APIs

# ── Prevent first-boot wizard ───────────────────────────────────────
hw.arc=false
hw.sensors.heart_rate=false
hw.sensors.humidity=false
hw.sensors.light=false
hw.sensors.pressure=false
hw.sensors.temperature=false
hw.camera=no
hw.camera.back=none
hw.camera.front=none
fastboot.forceColdBoot=no
fastboot.forceFastBoot=yes
